name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS-arm64
            c_compiler: clang
            cpp_compiler: clang++
          - os: ubuntu-latest
            name: Linux-x86_64
            c_compiler: gcc
            cpp_compiler: g++
          - os: windows-latest
            name: Windows-x86_64
            c_compiler: cl
            cpp_compiler: cl

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev libzstd-dev libflac-dev libutf8proc-dev xxhash libxxhash-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install zstd flac utf8proc xxhash

      - name: Setup vcpkg (Windows)
        if: runner.os == 'Windows'
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
          .\vcpkg\vcpkg install zlib zstd flac utf8proc xxhash --triplet x64-windows
        shell: pwsh

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        run: >
          cmake -B ${{ steps.strings.outputs.build-output-dir }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=Release
          ${{ runner.os == 'Windows' && '-DCMAKE_TOOLCHAIN_FILE=./vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows' || '' }}
          -S ${{ github.workspace }}

      - name: Build
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config Release

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp build/chdlite staging/
          cd staging
          ln -s chdlite chdread
          ln -s chdlite chdhash
          tar czf ../CHDlite-${{ github.ref_name }}-${{ matrix.name }}.tar.gz *

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p staging
          cp build/Release/chdlite.exe staging/
          cp build/Release/chdlite.exe staging/chdread.exe
          cp build/Release/chdlite.exe staging/chdhash.exe
          cd staging
          7z a ../CHDlite-${{ github.ref_name }}-${{ matrix.name }}.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CHDlite-${{ matrix.name }}
          path: CHDlite-${{ github.ref_name }}-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            CHDlite-*.tar.gz
            CHDlite-*.zip
