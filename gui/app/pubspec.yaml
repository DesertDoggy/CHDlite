name: chdlite
description: "CHDlite GUI - Read, Hash, Extract, and Compress CHD files"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  desktop_drop: ^0.4.4
  path_provider: ^2.1.5
  file_picker: ^8.1.7
  ffi: ^2.1.4
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - ../assets/CHD read Icon1.png
    - ../assets/CHDcomp Icon1.png
    - ../assets/CHDlite Icon1.png
    - ../assets/Groove-Title.png
    - ../assets/CHD hash Icon1.png
